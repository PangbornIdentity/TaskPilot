<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskPilot</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />

    <!-- Google Fonts: Plus Jakarta Sans + DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Phosphor Icons CDN -->
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>

    <!-- MudBlazor CSS -->
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />

    <!-- App custom styles -->
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="TaskPilot.Client.styles.css" rel="stylesheet" />

    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="tp-loading">
            <svg class="tp-loading-icon" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
                <circle cx="25" cy="25" r="20" fill="none" stroke="#6255EC" stroke-width="4"
                        stroke-dasharray="80 40" stroke-linecap="round">
                    <animateTransform attributeName="transform" type="rotate"
                                      from="0 25 25" to="360 25 25" dur="0.8s" repeatCount="indefinite" />
                </circle>
            </svg>
            <p class="tp-loading-text">Loading TaskPilot...</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">&#x2715;</span>
    </div>

    <!-- MudBlazor JS -->
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
